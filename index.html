<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>13-lin-Colmar Academy</title>
  </head>
  <body>
    <!--HEADER-->
    <header>
      <nav
        class="flex items-center justify-between border-b border-gray-200 bg-white px-6 py-4"
      >
        <!--logo name-->
        <div class="hidden items-center gap-2 md:flex">
          <img src="/src/01_header/ic-logo.svg" alt="Logo" class="h-8" />
          <p class="h-8 text-xl font-bold">
            COLMAR<span class="text-xl font-normal text-gray-500">ACADEMY</span>
          </p>
        </div>

        <!--menu bar-->
        <div class="hidden items-center gap-4 text-base md:flex">
          <a href="#" class="text-gray-900">On campus</a>
          <a href="#" class="text-gray-900">Online</a>
          <a href="#" class="text-gray-900">For companies</a>
          <a href="#" class="text-gray-900">Sign in</a>
        </div>

        <!--mobile logo-->
        <div class="flex w-full items-center justify-around md:hidden">
          <img src="/src/01_header/ic-logo.svg" alt="Logo" class="h-8" />
          <img
            src="/src/01_header/ic-on-campus.svg"
            alt="campusLogo"
            class="h-8"
          />
          <img
            src="/src/01_header/ic-online.svg"
            alt="onlineLogo"
            class="h-8"
          />
          <img src="/src/01_header/ic-login.svg" alt="loginLogo" class="h-8" />
        </div>
      </nav>
    </header>

    <!--1-SECTION HERO-->
    <main>
      <section id="hero" class="flex flex-col md:flex-row bg-gray-200">
        <!--Left img box-->
        <div class="w-full md:w-[60%] md:px-6 md:py-8">
          <img src="/src/02_hero/banner.jpg" alt="heroBanner" class="w-full" />
        </div>
        <!--Right text box-->
        <div
          class="w-full md:w-[40%] flex flex-col md:justify-center md:items-start px-4"
        >
          <h1 class="text-5xl font-bold my-8 text-gray-600">
            Learn something <br />
            new everyday
          </h1>
          <p class="text-2xl mb-6 text-gray-600 font-semibold">
            Lorem ipsum dolor sit amet,<br />
            consectetur adipiscing elit.
          </p>
          <button
            class="bg-gray-400 md:bg-gray-600 font-semibold text-white px-30 py-2 mb-8"
          >
            Start here
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
